<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en-US' }}">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ site.url }}{{ page.url | replace:'index.html','' }}">
  <link rel="icon" media="(prefers-color-scheme:dark)" href="{{ site.favicon_dark | replace: './', '/' }}" type="image/png">
  <link rel="icon" media="(prefers-color-scheme:light)" href="{{ site.favicon | replace: './', '/' }}" type="image/png">
  <link rel="stylesheet" href="/assets/notes/notes.css?v=20260624e">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
  <header class="note-topbar">
    <a class="note-brand" href="/">Chao Wang</a>
    <div class="note-current-title" aria-current="page">{{ page.title }}</div>
    <nav class="note-nav" aria-label="Section navigation">
      <a href="/deep-learning/">Deep Learning Notes</a>
    </nav>
  </header>

  <div class="note-shell">
    <main class="note-main">
      <article class="note-article" data-note-article>
        {{ content }}
      </article>
    </main>

    <aside class="note-toc" aria-label="Table of contents">
      <div class="note-toc-title">Outline</div>
      <nav data-note-toc></nav>
    </aside>
  </div>

  <button class="note-back-to-top" type="button" aria-label="Back to top" title="Back to top" data-back-to-top>
    ↑
  </button>

  <script src="/assets/notes/notes.js?v=20260624e"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S94YYNZWEY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-S94YYNZWEY');
  </script>
</body>

</html>
